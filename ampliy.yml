version: 1
appRoot: my-helpdesk 
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npx prisma generate
        - npm run build
        # This creates the necessary nested folders if they don't exist
        - mkdir -p .next/standalone/my-helpdesk/.next/static
        - mkdir -p .next/standalone/my-helpdesk/public
        # Now copy the files into the guaranteed paths
        - cp -r .next/static/. .next/standalone/my-helpdesk/.next/static/
        - cp -r public/. .next/standalone/my-helpdesk/public/
  artifacts:
    baseDirectory: .next/standalone/my-helpdesk
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*