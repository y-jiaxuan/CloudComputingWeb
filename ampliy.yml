version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd my-helpdesk && npm install
    build:
      commands:
        # We don't need 'cd' again if we chain them, 
        # or we ensure we are in the right spot.
        - cd my-helpdesk && npx prisma generate
        - cd my-helpdesk && npm run build
  artifacts:
    baseDirectory: my-helpdesk/.next
    files:
      - '**/*'
  cache:
    paths:
      - my-helpdesk/node_modules/**/*
      - my-helpdesk/.next/cache/**/*