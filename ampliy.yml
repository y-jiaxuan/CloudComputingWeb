version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd my-helpdesk && npm install
    build:
      commands:
        - cd my-helpdesk && npx prisma generate
        - cd my-helpdesk && npm run build
  artifacts:
    baseDirectory: my-helpdesk/.next # Or 'my-helpdesk/.next/standalone' depending on Amplify's detection
    files:
      - '**/*'
  cache:
    paths:
      - my-helpdesk/node_modules/**/*