version: 1
appRoot: my-helpdesk 

frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npx prisma generate
        - npm run build
  artifacts:
    # This is the change: 'standalone' is required for Next.js SSR on Amplify
    baseDirectory: .next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*