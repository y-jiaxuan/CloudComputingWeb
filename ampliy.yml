version: 1
appRoot: my-helpdesk 
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npx prisma generate
        - npm run build
        # Next.js standalone needs these moved inside to be 'self-contained'
        - mkdir -p .next/standalone/my-helpdesk/.next
        - cp -r .next/static .next/standalone/my-helpdesk/.next/static
        - cp -r public .next/standalone/my-helpdesk/public
  artifacts:
    baseDirectory: .next/standalone/my-helpdesk
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*