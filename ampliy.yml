version: 1
appRoot: my-helpdesk 
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npx prisma generate
        - npm run build
        # IMPORTANT: Next.js standalone doesn't include static files by default.
        # We must copy them into the standalone folder so the UI loads.
        - cp -r .next/static .next/standalone/my-helpdesk/.next/static
        - cp -r public .next/standalone/my-helpdesk/public
  artifacts:
    # We point to the inner folder created by the 'standalone' build
    baseDirectory: .next/standalone/my-helpdesk
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*