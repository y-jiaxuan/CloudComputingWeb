version: 1
# This is the secret sauce: it sets the working directory for all phases
appRoot: my-helpdesk 

frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        # Prisma generate is already handled by postinstall, 
        # but we keep it here just to be safe.
        - npx prisma generate
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*